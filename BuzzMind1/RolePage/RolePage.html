<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="RolePage.css">

</head>

<body>
    <!-- MAIN CONTENT -->
    <div id="header">
        <h1><b>Pick Your <i id="pw">Power!</i></b></h1>

        <p>Ready to start the game? Choose the role that fits your mission today.</p>
    </div>

    <div class="roles-grid">

        <div class="role-card" data-role="professor" onclick="selectRole(this)">
            <div class="role-icon professor-icon">🎓</div>
            <h2>Professor</h2>
        </div>

        <div class="role-card" data-role="student" onclick="selectRole(this)">
            <div class="role-icon student-icon">🚀</div>
            <h2>Student</h2>
        </div>

        <div class="role-card" data-role="admin" onclick="selectRole(this)">
            <div class="role-icon admin-icon">🛡️</div>
            <h2>Admin</h2>
        </div>

    </div>


    <div class="cta-area">
        <button id="continue-btn" onclick="handleContinue()">
            Continue Journey <span class="lock-icon" id="lock-icon">🔒</span>
        </button>
        <p class="cta-hint" id="cta-hint">CHOOSE A ROLE TO UNLOCK THE NEXT LEVEL</p>
    </div>



    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <div class="footer-brand">
            <a href="#" class="logo footer-logo">BuzzMind</a>
            <p>
                Empowering learners and educators through kinetic, high-energy play.
            </p>
        </div>
    </footer>

    <div class="footer-bottom">
        <span>© 2026 BuzzMind. All rights reserved.</span>
    </div>

    <script src="RolePage.js"></script>

</body>

</html>
