<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Login Page.css">
</head>

<body>
    <main class="main-content">
    <div class="card">
        <div class="brand">BuzzMind</div>
        <h1>Create Your Account</h1>
        <p class="sub">Join the BuzzMind community today.</p>

        <form onsubmit="return validateemail()">
            <div class="form-row">
                <div class="field" style="margin-bottom:0">
                    <label for="fullname">Full Name</label>
                    <input id="fullname" type="text" placeholder="Alex Rivera" />
                    <span id="nvir" style="color:red; font-size:0.75rem;"></span>
                </div>
                <div class="field" style="margin-bottom:0">
                    <label for="username">Username</label>
                    <input id="username" type="text" placeholder="arivera_pro" />
                    <span id="unvir" style="color:red; font-size:0.75rem;"></span>
                </div>
            </div>

            <div class="field">
                <label for="email">Email Address</label>
                <input id="email" type="email" placeholder="alex@university.edu" />
                <span id="evir" style="color:red; font-size:0.75rem;"></span>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input id="password" type="password" placeholder="••••••••" />
                <span id="pvir" style="color:red; font-size:0.75rem;"></span>
            </div>

            <button class="cta-btn" type="submit">Create Account</button>
        </form>

    </div>
</main>


    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <div class="footer-brand">
            <a href="#" class="logo footer-logo">BuzzMind</a>
            <p>
                Empowering learners and educators through kinetic, high-energy play.
            </p>
        </div>

    </footer>

    <div class="footer-bottom">
        <span>© 2026 BuzzMind. All rights reserved.</span>
    </div>

    <script src="Login Page.js"></script>
</body>

</html>
