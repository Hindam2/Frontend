<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BuzzMind – Settings</title>
  <link rel="stylesheet" href="../../Student pages/Home Page/style.css" />
  <link rel="stylesheet" href="SettingsP.css" />
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <a href="index.html" class="logo">BuzzMind</a>
    <ul class="nav-links">
      <li><a href="../Classes page/professor2.html">Classes</a></li>
      <li><a href="#">Students</a></li>
    </ul>
    <div class="nav-actions">
      </button>
      <a href="#" class="avatar">M</a>
    </div>
  </nav>

  <!-- ===== PAGE CONTENT ===== -->
  <div class="settings-page">

    <!-- Page Title -->
    <div class="settings-header">
      <h1>Settings</h1>
      <p>Manage your account</p>
    </div>

    <!-- ===== PROFILE CARD ===== -->
    <div class="profile-card">
      <div class="profile-avatar">
        <span>U</span>
      </div>
      <div class="profile-info">
        <h2>Your Name</h2>
      </div>
    </div>

    <!-- ===== ACCOUNT SETTINGS ===== -->
    <div class="settings-card">
      <div class="card-title">
        <div class="card-icon purple-icon">👤</div>
        <h3>Account Settings</h3>
      </div>
      <hr />
      <div class="form-row">
        <div class="form-group">
          <label>DISPLAY NAME</label>
          <input type="text" id="displayName" placeholder="Enter Your Name"/>
        </div>
        <div class="form-group">
          <label>EMAIL ADDRESS</label>
          <input type="email" id="emailAddress" placeholder="Enter Your Email" />
        </div>
        <div class="form-group">
          <label>ID</label>
          <input type="text" id="username"  />
        </div>
      </div>
      <div class="card-actions">
        <button class="btn-primary" onclick="saveAccount()">Save Changes</button>
      </div>
      <p class="form-msg" id="accountMsg"></p>
    </div>

    <!-- ===== SECURITY & PASSWORD ===== -->
    <div class="settings-card">
      <div class="card-title">
        <div class="card-icon red-icon">🔒</div>
        <h3>Security &amp; Password</h3>
      </div>
      <hr />
      <div class="form-group full-width">
        <label>CURRENT PASSWORD</label>
        <input type="password" id="currentPassword" placeholder="••••••••••••" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>NEW PASSWORD</label>
          <input type="password" id="newPassword" placeholder="••••••••" />
        </div>
        <div class="form-group">
          <label>CONFIRM NEW PASSWORD</label>
          <input type="password" id="confirmPassword" placeholder="••••••••" />
        </div>
      </div>
      <div class="card-actions">
        <button class="btn-dark" onclick="updatePassword()">Update Password</button>
      </div>
      <p class="form-msg" id="passwordMsg"></p>
    </div>

    <!-- ===== LOGOUT ===== -->
    <div class="logout-area">
      <a href="../../Login Page/Login Page.html">
        <button class="btn-logout" onclick="logout()">
          ↪ Logout
        </button>
      </a>
    </div>

  </div>

  <script src="SettingsP.js"></script>
</body>
</html>
