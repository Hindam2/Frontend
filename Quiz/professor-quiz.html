<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BuzzMind – Professor View</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="quiz.css" />
    <link rel="stylesheet" href="professor-quiz.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=DM+Sans:wght@400;500&display=swap"
      rel="stylesheet" />
  </head>
  <body>

    <main class="prof-main">

      <!-- Left: question display + answer breakdown -->
      <section class="prof-question-panel">
        <!-- Question badge + text -->
        <div class="prof-question-header">
          <span class="question-badge" id="profQuestionBadge">QUESTION 1 OF 10</span>
          <h2 class="prof-question-text" id="profQuestionText">Waiting to start...</h2>
        </div>

        <!-- Optional image -->
        <div id="profImageWrapper" style="display:none;">
          <img id="profQuestionImage" src="" alt="Question image" class="question-img" />
        </div>

        <!-- Answer options (display only, no clicking for professor) -->
        <div class="prof-answers-grid" id="profAnswersGrid">
          <!-- Filled by JS -->
        </div>
      </section>

      <!-- Right: live stats panel -->
      <aside class="prof-stats-panel">

        <!-- Submitted count -->
        <div class="stat-card">
          <p class="stat-label">ANSWERS SUBMITTED</p>
          <p class="stat-value" id="submittedCount">0 / 0</p>
          <div class="stat-bar-bg">
            <div class="stat-bar-fill" id="submittedBar" style="width:0%"></div>
          </div>
        </div>

        <!-- Timer display -->
        <div class="stat-card">
          <p class="stat-label">TIME REMAINING</p>
          <p class="stat-value timer-big" id="profTimer">20s</p>
        </div>

        <!-- Controls -->
        <div class="prof-controls">
          <button class="btn-next" id="nextBtn" onclick="nextQuestion()" style="color:brown">
            Next Question ▶
          </button>
          <button class="btn-end" id="endBtn" onclick="endQuiz()" style="display:none;">
            End Quiz
          </button>
        </div>

        <!-- Leaderboard -->
        <div class="leaderboard-card">
          <h3 class="leaderboard-title">🏆 Leaderboard</h3>
          <ol class="leaderboard-list" id="leaderboardList">
            <!-- Filled by JS -->
          </ol>
        </div>

      </aside>
    </main>

    <script src="quiz-data.js"></script>
    <script src="professor-quiz.js"></script>
  </body>
</html>
