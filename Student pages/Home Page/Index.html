<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuzzMind</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="#" class="logo">BuzzMind</a>

    <ul class="nav-links">
      <li><a href="#" class="active">Discover</a></li>
      <li><a href="../Libary/index.html">Library</a></li>

    </ul>

    <div class="nav-actions">
      <a href="../Settings page/Settings.html" class="avatar">U</a>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <h1>The fun way to <em>learn</em> and <em>play!</em></h1>

    <p class="hero-sub">
      Host a game, challenge your friends, and master any subject.
    </p>

    <!-- PIN CARD -->
    <div class="pin-card">

      <input
        type="text"
        id="pinInput"
        class="pin-input"
        placeholder="GAME PIN"
        maxlength="6"
      >

      <button class="btn-join" onclick="joinGame(event)">
        JOIN GAME
      </button>

      <p class="pin-hint">
        Ask your host for the game PIN to join
      </p>

    </div>
  </section>

  <script src="script.js"></script>
</body>
